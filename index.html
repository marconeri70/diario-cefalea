<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cefalea Diary Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#2196F3">
</head>
<body>
    <header class="app-header">
        <h1>Cefalea Diary Pro</h1>
    </header>

    <main id="app">
        <section class="card map-section">
            <h2>Mappatura del Dolore</h2>
            <div class="views-toggle">
                <button class="active" data-view="anterior">Anteriore</button>
                <button data-view="posterior">Posteriore</button>
            </div>

            <div class="svg-container">
                <svg id="painMapSvg" viewBox="0 0 200 250">
                    <g id="anteriorView">
                        <path class="pain-zone" data-zone="Fronte" d="M60,50 Q100,20 140,50 Q140,80 60,80 Z" />
                        <path class="pain-zone" data-zone="Tempia Sinistra" d="M45,60 Q55,70 60,100 Q45,100 45,60 Z" />
                        <path class="pain-zone" data-zone="Tempia Destra" d="M155,60 Q145,70 140,100 Q155,100 155,60 Z" />
                        <path class="pain-zone" data-zone="Viso/Occhi" d="M60,80 Q100,100 140,80 Q130,140 100,160 Q70,140 60,80 Z" />
                        <text x="100" y="110" text-anchor="middle" fill="#ccc" font-size="10" pointer-events="none">Vista Anteriore</text>
                    </g>
                    <g id="posteriorView" style="display: none;">
                        <path class="pain-zone" data-zone="Occipitale" d="M60,50 Q100,10 140,50 Q150,110 100,130 Q50,110 60,50 Z" />
                        <path class="pain-zone" data-zone="Cervicale" d="M80,120 Q100,115 120,120 L130,180 Q100,190 70,180 Z" />
                        <text x="100" y="110" text-anchor="middle" fill="#ccc" font-size="10" pointer-events="none">Vista Posteriore</text>
                    </g>
                </svg>
            </div>

            <div class="intensity-slider">
                <label>Intensità: <strong id="intensityVal">0</strong>/10</label>
                <input type="range" id="intensity" min="0" max="10" value="0">
            </div>
        </section>

        <section class="card clinical-section">
            <div class="input-group">
                <h3>Sintomi</h3>
                <div id="symptomsList" class="badge-container"></div>
            </div>
            <div class="input-group">
                <h3>Trigger</h3>
                <div id="triggersList" class="badge-container"></div>
            </div>
            <div class="input-group">
                <h3>Farmaci Assunti</h3>
                <div class="flex-input">
                    <input type="text" id="drugInput" placeholder="Es. Sumatriptan 50mg">
                    <button id="addDrugBtn" class="btn-secondary">+</button>
                </div>
                <div id="usedMeds" class="badge-container"></div>
            </div>
            <button class="btn-primary" id="saveAttack">REGISTRA ATTACCO</button>
        </section>

        <section class="card history-section">
            <div class="history-header">
                <h2>Storico Recente</h2>
                <button id="generatePdf" class="btn-outline">Scarica PDF</button>
            </div>
            <div id="historyEntries" class="history-list"></div>
        </section>
    </main>

    <script src="libs/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
